name: Publish static site

on:
  schedule:
    # Monday noon UTC — after Sunday slate; Tuesday catches rare Monday games.
    - cron: "0 12 * * 1"
    - cron: "0 12 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build rankings and static site
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
        run: python run_bcpi.py export-site --refresh

      - name: Commit site and rankings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ output/
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Publish BCPI site and rankings [automated]"
            git push
          fi
